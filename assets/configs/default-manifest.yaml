{
  "version": 1,
  "hub_root": "~/.agent-skills-hub",
  "sources": {
    "openai": {
      "repo": "openai/skills",
      "ref": "main",
      "paths": ["skills/.curated"]
    },
    "antigravity": {
      "repo": "sickn33/antigravity-awesome-skills",
      "ref": "main",
      "paths": ["skills"]
    }
  },
  "policies": {
    "namespace_prefix": {
      "openai": "oa",
      "antigravity": "ag"
    },
    "copy_fallback": true
  },
  "targets": {
    "codex": { "enabled": true, "path": "~/.codex/skills" },
    "antigravity": { "enabled": true, "path": "~/.gemini/antigravity/skills" },
    "claude": { "enabled": true, "path": "~/.claude/skills" },
    "gemini": { "enabled": true, "path": "~/.gemini/skills" },
    "cursor": { "enabled": true, "path": "~/.cursor/skills" },
    "kiro": { "enabled": true, "path": "~/.kiro/skills" }
  },
  "copilot": {
    "bridge_mode": "hybrid",
    "instructions_output": ".github/copilot-instructions.md",
    "prompts_dir": ".github/prompts",
    "skills_index_markdown": "docs/ai/skills-index.md"
  },
  "agent_docs": {
    "enabled": true,
    "outputs": {
      "agents_md": "AGENTS.md",
      "claude_md": "CLAUDE.md",
      "gemini_md": "GEMINI.md",
      "copilot_agent_md": ".github/agents/copilot-instructions.md",
      "codex_auto_prompt": ".codex/prompts/auto-execute.prompt.md"
    }
  },
  "spec_workflow": {
    "enabled": true,
    "provider": "spec-kit",
    "repo": "github/spec-kit",
    "default_ai": "codex",
    "default_script": "ps",
    "default_here": true,
    "default_ignore_agent_tools": true,
    "default_force": true,
    "preserve_repo_templates": true
  },
  "security": {
    "allow_exec_files": false
  }
}
