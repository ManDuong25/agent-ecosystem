name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build all platforms
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X 'github.com/sickn33/agent-ecosystem/internal/cli.version=${VERSION}'"
          
          mkdir -p dist
          
          # Linux
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/aeco-linux-amd64 ./cmd/aeco
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/aeco-linux-arm64 ./cmd/aeco
          
          # macOS
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/aeco-darwin-amd64 ./cmd/aeco
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/aeco-darwin-arm64 ./cmd/aeco
          
          # Windows
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/aeco-windows-amd64.exe ./cmd/aeco
          GOOS=windows GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/aeco-windows-arm64.exe ./cmd/aeco

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/aeco-*
            dist/checksums.txt
          generate_release_notes: true
